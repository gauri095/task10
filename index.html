<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LaundryMart Animation</title>

<!-- linking css file -->
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- simple navbar -->
<div class="navbar">
    <span class="logo">LaundryMart</span>

    <span class="links">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </span>
</div>


<!-- HERO SECTION -->
<div class="hero">

    <!-- left side text -->
    <div class="text">
        <h1>Welcome to LaundryMart</h1>
        <p>We clean your clothes with care.</p>
        <button>Book Service</button>
    </div>


    <!-- right side animation -->

    <!-- 
    orbit = the dashed circle
    planet-squeeze = wrapper used for squash/stretch animation
    planet = actual image that rotates around the orbit
    -->
    <div class="orbit">

        <div class="planet-squeeze">

            <img class="planet"
            src="https://plus.unsplash.com/premium_vector-1728553012689-aff42c4a4e7e?q=80&w=580&auto=format&fit=crop"
            alt="Laundry">

        </div>

    </div>

</div>

</body>
</html>
